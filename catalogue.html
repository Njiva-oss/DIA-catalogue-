<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIA - Catalogue Produits</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toolbar h1 {
            font-size: 20px;
            margin: 0;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .page-info {
            color: white;
            margin: 0 10px;
        }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #pdfContainer {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #e0e0e0;
            padding: 20px;
        }
        #pdfCanvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <h1>📋 DIA - Catalogue Produits</h1>
            <div class="controls">
                <button id="prevBtn" onclick="previousPage()">← Précédent</button>
                <input type="number" id="pageNum" value="1" min="1" onchange="goToPage()">
                <span class="page-info">/ <span id="totalPages">-</span></span>
                <button id="nextBtn" onclick="nextPage()">Suivant →</button>
                <button onclick="downloadPDF()">⬇ Télécharger</button>
            </div>
        </div>
        <div id="pdfContainer">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>

    <script>
        let pdfDoc = null;
        let currentPage = 1;

        // Configuration de PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Charger le PDF
        async function loadPDF() {
            try {
                pdfDoc = await pdfjsLib.getDocument('./Catalogue%20produits%20-%20DIA.pdf').promise;
                document.getElementById('totalPages').textContent = pdfDoc.numPages;
                renderPage(currentPage);
            } catch (error) {
                console.error('Erreur lors du chargement du PDF:', error);
                document.getElementById('pdfContainer').innerHTML = '<p style="color: red; padding: 20px;">Erreur: Impossible de charger le catalogue. Veuillez vérifier que le fichier PDF existe.</p>';
            }
        }

        // Afficher une page
        async function renderPage(pageNum) {
            if (!pdfDoc) return;

            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.getElementById('pdfCanvas');
                const context = canvas.getContext('2d');

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                document.getElementById('pageNum').value = pageNum;
                document.getElementById('prevBtn').disabled = pageNum <= 1;
                document.getElementById('nextBtn').disabled = pageNum >= pdfDoc.numPages;
            } catch (error) {
                console.error('Erreur lors de l\'affichage de la page:', error);
            }
        }

        // Navigation
        function nextPage() {
            if (currentPage < pdfDoc.numPages) {
                currentPage++;
                renderPage(currentPage);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        }

        function goToPage() {
            const pageNum = parseInt(document.getElementById('pageNum').value);
            if (pageNum >= 1 && pageNum <= pdfDoc.numPages) {
                currentPage = pageNum;
                renderPage(currentPage);
            }
        }

        function downloadPDF() {
            const link = document.createElement('a');
            link.href = './Catalogue%20produits%20-%20DIA.pdf';
            link.download = 'Catalogue-DIA.pdf';
            link.click();
        }

        // Charger le PDF au démarrage
        loadPDF();

        // Navigation au clavier
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') nextPage();
            if (event.key === 'ArrowLeft') previousPage();
        });
    </script>
</body>
</html>
